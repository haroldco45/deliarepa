<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliArepas - Suleima - Pedidos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- ESTILOS CSS --- */
        :root {
            --primary-color: #f7b500;
            --secondary-color: #333;
            --accent-color: #fff;
            --bg-color: #f4f4f4;
            --border-radius: 12px;
            --box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--secondary-color);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background-color: var(--accent-color);
            width: 100%;
            max-width: 500px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            padding-bottom: 20px;
        }

        header {
            background: linear-gradient(135deg, #444, #222);
            color: var(--accent-color);
            padding: 25px;
            text-align: center;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            margin-bottom: 10px;
        }

        .ubicacion { font-size: 0.85em; opacity: 0.9; margin-top: 10px; }

        section { padding: 20px; }
        h2 { font-size: 1.2em; border-bottom: 3px solid var(--primary-color); margin-bottom: 15px; display: inline-block; }

        .producto-card {
            display: flex;
            background: #fff;
            border: 2px solid #eee;
            border-radius: var(--border-radius);
            padding: 12px;
            align-items: center;
        }

        .producto-img { 
            width: 100px; 
            height: 70px; 
            border-radius: 8px; 
            margin-right: 15px;
            object-fit: cover;
        }
        
        .producto-info h3 { font-size: 1em; }
        .precio { font-size: 1.2em; font-weight: bold; color: #d9534f; }

        .formulario-pedido { background-color: #fafafa; }
        
        .item-pedido {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .cantidad-control {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .cantidad-control button {
            background: var(--primary-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
        }

        .cantidad-control input {
            width: 50px;
            text-align: center;
            border: none;
            font-size: 1.3em;
            font-weight: bold;
        }

        .select-estilo {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .seccion-total {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .datos-cliente label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 0.9em; }
        .datos-cliente input, .datos-cliente textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
        }

        .btn-ubicacion {
            width: 100%; background: #6c757d; color: white; border: none; padding: 10px;
            border-radius: 8px; margin-top: 10px; cursor: pointer;
        }

        .btn-whatsapp {
            width: 100%; background: #25d366; color: white; border: none; padding: 15px;
            border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        footer { text-align: center; padding: 20px; font-size: 0.8em; color: #777; border-top: 1px solid #eee; }
        .dev-link { color: #007bff; text-decoration: none; font-weight: bold; }

        .status-msg { font-size: 0.8em; margin-top: 5px; text-align: center; }
        .success { color: green; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img src="deliarepa1.PNG" alt="Logo DeliArepas" class="logo-img">
            <p>Emprendimiento de Suleima</p>
            <p class="ubicacion"><i class="fas fa-map-marker-alt"></i> Barrio El Triángulo, Caucasia</p>
        </header>

        <section>
            <h2>Producto</h2>
            <div class="producto-card">
                <img src="deliarepa.JPG" alt="Arepa" class="producto-img">
                <div class="producto-info">
                    <h3>Arepa con Queso Fundido</h3>
                    <p class="precio">$7.000</p>
                </div>
            </div>
        </section>

        <section class="formulario-pedido">
            <form id="form-pedido">
                <div class="item-pedido">
                    <label>¿Cuántas quieres?</label>
                    <div class="cantidad-control">
                        <button type="button" onclick="cambiarCantidad(-1)">-</button>
                        <input type="number" id="cantidad" value="1" readonly>
                        <button type="button" onclick="cambiarCantidad(1)">+</button>
                    </div>
                    
                    <label>Acompañante:</label>
                    <select id="adicional" class="select-estilo">
                        <option value="Sencilla (Solo Queso)">Sencilla (Solo Queso)</option>
                        <option value="con Arequipe">con Arequipe</option>
                        <option value="con Lecherita">con Lecherita</option>
                        <option value="con Mantequilla">con Mantequilla</option>
                    </select>
                </div>

                <div class="seccion-total">
                    <span>TOTAL:</span>
                    <span id="total-txt">$7.000</span>
                </div>

                <div class="datos-cliente">
                    <label>Nombre:</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>

                    <label>Dirección:</label>
                    <input type="text" id="direccion" placeholder="Calle, Carrera, Barrio" required>

                    <button type="button" class="btn-ubicacion" id="btn-geo">
                        <i class="fas fa-location-arrow"></i> Usar mi ubicación GPS
                    </button>
                    <p id="geo-status" class="status-msg"></p>
                    <input type="hidden" id="geo-url">

                    <label>Observaciones:</label>
                    <textarea id="obs" placeholder="Ej: Sin sal, portería, etc."></textarea>
                </div>

                <button type="submit" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> PEDIR POR WHATSAPP
                </button>
            </form>
        </section>

        <footer>
            <p>App desarrollada por:</p>
            <a href="https://wa.me/573117700431" class="dev-link">Vibras Positivas (311 770 0431)</a>
            <p>© 2026 Todos los derechos reservados</p>
        </footer>
    </div>

    <script>
        const precioUnitario = 7000;
        const whatsappSuleima = "3117348206";

        function cambiarCantidad(valor) {
            const input = document.getElementById('cantidad');
            let nuevaCant = parseInt(input.value) + valor;
            if (nuevaCant < 1) nuevaCant = 1;
            input.value = nuevaCant;
            
            document.getElementById('total-txt').innerText = '$' + (nuevaCant * precioUnitario).toLocaleString('es-CO');
        }

        document.getElementById('btn-geo').addEventListener('click', function() {
            const status = document.getElementById('geo-status');
            status.innerText = "Obteniendo ubicación...";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('geo-url').value = url;
                    status.innerText = "¡Ubicación fijada correctamente!";
                    status.classList.add('success');
                }, () => {
                    status.innerText = "Error al obtener ubicación.";
                });
            }
        });

        function checkSuscripcion() {
            const inicio = localStorage.getItem('deliarepas_start');
            const hoy = new Date();
            if (!inicio) {
                localStorage.setItem('deliarepas_start', hoy.toISOString());
            } else {
                const diff = Math.floor((hoy - new Date(inicio)) / (1000 * 60 * 60 * 24));
                if (diff > 15) {
                    alert("Periodo de prueba terminado. Contacta a Vibras Positivas.");
                }
            }
        }
        checkSuscripcion();

        document.getElementById('form-pedido').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const cant = document.getElementById('cantidad').value;
            const adic = document.getElementById('adicional').value;
            const nom = document.getElementById('nombre').value;
            const dir = document.getElementById('direccion').value;
            const obs = document.getElementById('obs').value;
            const geo = document.getElementById('geo-url').value;
            const total = (cant * precioUnitario).toLocaleString('es-CO');

            let msg = `*NUEVO PEDIDO - DELIAREPAS*%0A`;
            msg += `----------------------------%0A`;
            msg += `*Producto:* Arepa con Queso%0A`;
            msg += `*Cantidad:* ${cant}%0A`;
            msg += `*Opción:* ${adic}%0A`;
            msg += `*TOTAL:* $${total}%0A`;
            msg += `----------------------------%0A`;
            msg += `*Cliente:* ${nom}%0A`;
            msg += `*Dirección:* ${dir}%0A`;
            if(geo) msg += `*Mapa:* ${geo}%0A`;
            if(obs) msg += `*Nota:* ${obs}%0A`;
            msg += `----------------------------%0A`;
            msg += `_App desarrollada por Vibras Positivas (3117700431)_%0A`;
            msg += `_© Derechos de Autor 2026_`;

            window.open(`https://wa.me/57${whatsappSuleima}?text=${msg}`, '_blank');
        });
    </script>
</body>
</html>
